{% extends "base.html" %}
{% block title %}{{ 'Register' if mode=='register' else 'Login' }} — Bulk Email Pro{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">📧 Bulk Email Pro</h1>
        <p class="auth-subtitle">Send bulk emails from your own accounts</p>
        <div class="auth-tabs">
            <a href="{{ url_for('login') }}" class="auth-tab {% if mode=='login' %}active{% endif %}">Login</a>
            <a href="{{ url_for('register') }}" class="auth-tab {% if mode=='register' %}active{% endif %}">Register</a>
        </div>
        <form method="POST" action="{{ url_for('register') if mode=='register' else url_for('login') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-accent btn-block">
                {{ 'Create Account' if mode=='register' else 'Sign In' }}
            </button>
        </form>
    </div>
</div>
{% endblock %}
